name: Deploy to Dev Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ruff lint
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/project/loki-mcp
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          if git diff HEAD~1 --name-only | grep -qE 'pyproject\.toml|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f
